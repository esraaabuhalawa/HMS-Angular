<form id="roomForm" [formGroup]="roomForm" class="max-w-4xl mx-auto pt-8 p-6" (ngSubmit)="save()">
  <!-- add-edit button -->
  <div class="flex justify-end mb-8">
    <p-button
      type="submit"
      [label]="roomId ? ('ROOM_FORM.UPDATE_ROOM' | translate) : ('ROOM_FORM.ADD_ROOM' | translate)"
      [loading]="loading"
      [disabled]="loading"
    >
    </p-button>
  </div>

  <!-- Room Number -->
  <div class="mb-5">
    <input
      pInputText
      formControlName="roomNumber"
      [placeholder]="'ROOM_FORM.ROOM_NUMBER' | translate"
      class="w-full"
    />
  </div>

  <!-- Price & Capacity -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
    <p-inputNumber
      formControlName="price"
      [placeholder]="'ROOM_FORM.PRICE' | translate"
      styleClass="w-full"
    >
    </p-inputNumber>

    <p-inputNumber
      formControlName="capacity"
      [placeholder]="'ROOM_FORM.CAPACITY' | translate"
      styleClass="w-full"
    >
    </p-inputNumber>
  </div>

  <!-- Discount & Facilities -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
    <p-inputNumber
      formControlName="discount"
      [placeholder]="'ROOM_FORM.DISCOUNT' | translate"
      styleClass="w-full"
    >
    </p-inputNumber>

    <p-multiselect
      [options]="facilities()"
      optionLabel="name"
      optionValue="_id"
      formControlName="facilities"
      [placeholder]="'ROOM_FORM.SELECT_FACILITIES' | translate"
      class="w-full"
    >
    </p-multiselect>
  </div>

  <!-- Upload -->
  <p-fileUpload
    #fileUpload
    mode="advanced"
    [multiple]="true"
    [showUploadButton]="false"
    [showCancelButton]="false"
    (onSelect)="onSelectFiles($event)"
  >
    <ng-template pTemplate="content">
      <div class="upload-area" (click)="fileUpload.choose()">
        <i class="pi pi-upload text-4xl mb-4"></i>

        <p>
          {{ 'ROOM_FORM.UPLOAD_TEXT' | translate }}
          <span class="text-green-600 font-medium">
            {{ 'ROOM_FORM.CHOOSE_IMAGES' | translate }}
          </span>
          {{ 'ROOM_FORM.UPLOAD_SUFFIX' | translate }}
        </p>
      </div>
    </ng-template>
  </p-fileUpload>

  <div class="flex gap-3 mt-3 flex-wrap">
    <!-- new imgs -->
    @for (img of previewUrls; track img; let i = $index) {
      <div class="relative">
        <img [src]="img" class="w-20 h-20 object-cover rounded border" />

        <button
          type="button"
          class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs"
          (click)="removeSelectedImage(i)"
        >
          <i class="pi pi-times"></i>
        </button>
      </div>
    }

    <!-- old imgs -->
    @if (existingImages.length) {
      @for (img of existingImages; track img; let i = $index) {
        <div class="relative">
          <img [src]="img" class="w-20 h-20 object-cover rounded border" />

          <button
            type="button"
            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs"
            (click)="removeExistingImage(i)"
          >
            <i class="pi pi-times"></i>
          </button>
        </div>
      }
    }
  </div>
</form>
