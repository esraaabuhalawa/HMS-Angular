<app-auth-layout>
  <!-- FORM SLOT -->
  <div class="h-full" auth-form>
    <!--Header Component-->
    <app-auth-header [title]="'LOGIN.HEADER_TITLE' | translate" [description]="'LOGIN.DESCRIPTION' | translate"
      [subText]="'LOGIN.SUB_TEXT' | translate" [linkText]="'LOGIN.REGISTER' | translate" linkUrl="/auth/register"
      linkClass="text-primary">
    </app-auth-header>

    <!--Start Of Form-->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <app-form-field [control]="form['email']" type="email" label="LOGIN.EMAIL_LABEL" placeholder="LOGIN.EMAIL_LABEL"
        [errorMessages]="{required: 'LOGIN.EMAIL_REQUIRED',email: 'LOGIN.EMAIL_INVALID'}">
      </app-form-field>

      <app-form-field [control]="form['password']" type="password" label="LOGIN.PASSWORD_LABEL"
        placeholder="LOGIN.PASSWORD_LABEL" [errorMessages]="{
        required: 'LOGIN.PASSWORD_REQUIRED',
        pattern: 'LOGIN.PASSWORD_PATTERN'
        }">
      </app-form-field>

      <div class="text-right mt-1">
        <a routerLink="/auth/forgot-password" class="text-xs text-primary font-medium hover:underline">{{
          'LOGIN.FORGOT_PASSWORD' | translate }}</a>
      </div>

      <div class="mt-[50px]">
        <p-button type="submit" [disabled]="isLoading" [label]="'LOGIN.BUTTON_LOGIN' | translate" [loading]="isLoading"
          styleClass="w-full">
        </p-button>
      </div>
    </form>

    <!-- Google Sign-In Divider -->
    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 border-t"></div>
      <span class="text-gray-500 dark:text-text-secondary text-sm">{{ 'LOGIN.OR_CONTINUE' | translate }}</span>
      <div class="flex-1 border-t"></div>
    </div>

    <!-- Google Sign-In Button -->
    <div class="flex justify-center mb-4">
      <asl-google-signin-button type="standard" size="large" theme="outline" text="signin_with" shape="rectangular"
        [width]="300" (click)="signInWithGoogle()">
      </asl-google-signin-button>
    </div>
  </div>

  <!-- IMAGE SLOT -->
  <div auth-image class="w-full h-full">
    <app-auth-image-section class="block w-full h-full" imageSrc="/images/login.png" imageAlt="Login"
      [title]="'LOGIN.TITLE' | translate" [subtitle]="'LOGIN.HEADER_DESC' | translate">
    </app-auth-image-section>
  </div>

</app-auth-layout>
