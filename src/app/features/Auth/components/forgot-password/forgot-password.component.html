<app-auth-layout>
  <div class="h-full" auth-form>
    <!--Header Component-->
    <app-auth-header title="Forgot Password"
      description="Don't worry, it happens. Enter your email address to reset your password." linkText="Sign in here!"
      linkUrl="/auth/login">
    </app-auth-header>

    <!--Start Of Form-->
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

      <div class="mb-[2rem]">
        <label class="text-primary font-normal  mb-2 block">Email</label>
        <input id="email" name="email" pInputText class="w-full" placeholder="Please type here ..."
          formControlName="email">

        @if (f['email'].touched && f['email'].errors?.['required']) {
        <small class="text-red-500">
          Email is required
        </small>
        }

        @if (f['email'].touched && f['email'].errors?.['email']) {
        <small class="text-red-500">
          Invalid email format
        </small>
        }
      </div>

      <div class="mt-[50px]">
        <p-button type="submit" label="Send mail" [loading]="isLoading" styleClass="w-full">
        </p-button>
      </div>

    </form>
  </div>

  <!-- IMAGE -->
  <div auth-image class="w-full h-full">
    <app-auth-image-section imageSrc="/images/forgot.png" imageAlt="forgot Password" title="Forgot password"
      subtitle="Homes as unique as you.">
    </app-auth-image-section>
  </div>

</app-auth-layout>
