<app-auth-layout>
  <div class="h-full" auth-form>
    <!--Form Header-->
    <app-auth-header [title]="'CHANGE_PASSWORD.TITLE' | translate"
      [description]="'CHANGE_PASSWORD.DESCRIPTION' | translate" [linkText]="''" linkUrl="/auth/login">
    </app-auth-header>

    <!---Start Of Form-->
    <form [formGroup]="changePasswordForm" (ngSubmit)="onResetPass()" class="pb-8">
      <!-- Old Password -->
      <app-form-field [control]="form['oldPassword']" type="password" label="RESET.OLD_PASSWORD_LABEL"
        placeholder="RESET.EMAIL_PLACEHOLDER" [errorMessages]="{
        required: 'RESET.PASSWORD_REQUIRED',
        pattern: 'RESET.PASSWORD_PATTERN'
      }">
      </app-form-field>

      <!-- New Password -->
      <app-form-field [control]="form['newPassword']" type="password" label="RESET.NEW_PASSWORD_LABEL"
        placeholder="RESET.EMAIL_PLACEHOLDER" [errorMessages]="{
        required: 'RESET.PASSWORD_REQUIRED',
        pattern: 'RESET.PASSWORD_PATTERN'
      }">
      </app-form-field>

      <!-- Confirm Password -->
      <app-form-field [control]="form['confirmPassword']" type="password" label="RESET.CONFIRM_PASSWORD_LABEL"
        placeholder="RESET.EMAIL_PLACEHOLDER" [errorMessages]="{required: 'RESET.CONFIRM_PASSWORD_REQUIRED'}"
        [customError]="
        changePasswordForm.hasError('passwordMismatch') &&
        (form['confirmPassword'].touched || form['confirmPassword'].dirty)
        " customErrorMessage="RESET.PASSWORDS_DO_NOT_MATCH">
      </app-form-field>

      <div class="mt-[50px]">
        <p-button type="submit" [label]="'CHANGE_PASSWORD.CHANGE_BUTTON' | translate" [loading]="loading()"
          styleClass="w-full">
        </p-button>
      </div>
    </form>
  </div>

  <!-- IMAGE SLOT -->
  <div auth-image class="w-full h-full">
    <app-auth-image-section imageSrc="/images/Reset-img.png" [imageAlt]="'RESET.IMAGE_ALT' | translate"
      [title]="'CHANGE_PASSWORD.TITLE' | translate" [subtitle]="'LOGIN.HEADER_DESC' | translate">
    </app-auth-image-section>
  </div>
</app-auth-layout>
