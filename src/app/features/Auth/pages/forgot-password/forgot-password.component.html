<app-auth-layout>
  <!-- FORM -->
  <div class=" h-full" auth-form>
    <h1 class="text-3xl font-medium text-black mb-4">
      Forgot password
    </h1>

    <p class="text-base font-normal mb-10 text-gray-600">
      If you already have an account register<br>
      You can
      <a routerLink="/auth/login" class="text-login-red font-semibold hover:underline">
        Login here !
      </a>
    </p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">

      <div class="mb-[2rem]">
        <label class="text-primary font-normal  mb-2 block">Email</label>
        <input  id="email" name="email" pInputText class="w-full" placeholder="Please type here ..." formControlName="email">

        @if (f['email'].touched && f['email'].errors?.['required']) {
        <small class="text-red-500">
          Email is required
        </small>
        }

        @if (f['email'].touched && f['email'].errors?.['email']) {
        <small class="text-red-500">
          Invalid email format
        </small>
        }
      </div>




      <div class="mt-[50px]">
        <p-button type="submit" label="Send mail" [loading]="isLoading" styleClass="w-full">
        </p-button>
      </div>

    </form>

  </div>

  <!-- IMAGE -->
  <div auth-image class="relative w-[90%] h-[95%] overflow-hidden rounded-2xl ">
    <img src="/images/forgot.png" alt="Tea plantation" class="absolute inset-0 w-full h-full object-cover">

    <div class="absolute left-20 bottom-10 right-10 text-white">
      <h2 class="text-2xl font-semibold mb-1 font-poppins text-secondary">
        Forgot password
      </h2>

      <p class="text-lg font-normal font-poppins text-secondary">
        Homes as unique as you.
      </p>
    </div>
  </div>
</app-auth-layout>
