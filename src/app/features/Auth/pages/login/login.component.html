<app-auth-layout>

  <!-- FORM SLOT -->
  <div auth-form>
    <h2 class="text-2xl font-bold mb-6">Login</h2>

    <form>
      <input class="w-full border p-2 mb-3" placeholder="Email" />
      <input class="w-full border p-2 mb-3" type="password" placeholder="Password" />

      <button class="w-full bg-indigo-600 text-white p-2">
        Login
      </button>
    </form>
  </div>

  <!-- IMAGE SLOT -->
  <div auth-image>
    <img src="assets/images/login.png" class="w-full max-w-md" />
  </div>

</app-auth-layout>
