<p-table [value]="skeletonRows" styleClass="p-datatable-striped" responsiveLayout="scroll">
  <ng-template pTemplate="header">
    <tr>
       @for (col of columns; track col.header){
        <th>{{ col.header }}</th>
      }
    </tr>
  </ng-template>
  <ng-template pTemplate="body">
    <tr>
       @for (col of columns; track col.header){
      <td>
        <p-skeleton [shape]="col.shape || 'rectangle'" [width]="col.width || '4rem'" [height]="col.height || '1rem'"
          [borderRadius]="col.borderRadius || '6px'">
        </p-skeleton>
      </td>
    }
    </tr>
  </ng-template>
</p-table>
