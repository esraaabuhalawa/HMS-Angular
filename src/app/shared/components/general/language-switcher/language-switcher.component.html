<p-select [options]="languages()" [ngModel]="selectedLanguage()"
  (onChange)="changeLanguage($event.value)"
  optionLabel="label" [showClear]="false" class="lang-switcher">

  <!-- Currently selected display -->
  <ng-template #selectedItem let-selectedOption>
    <div class="lang-option">
      <img [src]="selectedOption.value === 'en' ? languages()[1].flag : languages()[0].flag" class="flag-icon" width="24" />
      <span
      [style.font-family]="selectedOption.value === 'en'
        ? languages()[1].font : languages()[0].font">{{ selectedOption.value === 'en'? languages()[1].label: languages()[0].label }}
    </span>
    </div>
  </ng-template>

  <ng-template #item let-option>
    <div class="lang-option">
      <img [src]="option.flag" width="24" class="flag-icon" />
      <span [style.font-family]="option.font">
      {{ option.label }}
    </span>
    </div>
  </ng-template>

</p-select>
