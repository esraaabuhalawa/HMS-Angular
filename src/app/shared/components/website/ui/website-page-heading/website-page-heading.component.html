<div class="p-6  mb-8 grid grid-cols-3 items-center gap-4">
  <div>
    <p-breadcrumb [model]="breadcrumbs" [home]="home" styleClass="!border-none !bg-transparent !p-0 mb-10">
    </p-breadcrumb>
  </div>

  <div class="text-center mt-4">
    <h1 class="text-3xl font-bold text-primary">
      {{ title }}
    </h1>

    @if (description) {
    <p class="mt-1 text-gray-400">
      {{ description }}
    </p>
    }
  </div>

  <div></div>
</div>
