<div [routerLink]="`/rooms/${ad.room._id}`"
  class="group relative  rounded-2xl shadow-md transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl cursor-pointer h-72">

  <!-- Image (fills entire card) -->
  <img [src]="ad.room.images[0]" [alt]="ad.room.roomNumber"
    class="relative inset-0 h-full w-full object-cover transition duration-500 group-hover:scale-110" />

  <!-- Status Badge -->
  <p-tag [value]="ad.isActive ? 'Available' : 'Unavailable'" [severity]="ad.isActive ? 'success' : 'danger'"
    class="absolute top-3 start-3 z-10" />

  <!-- Title (bottom of image) -->
  <!-- Content -->
  <div class="p-5">
    <!-- Room Number -->
    <div class="flex items-center justify-between mb-2">
      <h3 class="text-[20px] font-regular text-primary">
        Room #{{ ad.room.roomNumber }}
      </h3>
    </div>

    <!-- Description -->
    <div class="flex flex-wrap gap-2 mb-2">
      @for (facility of ad.room.facilities; track facility) {
      <span class="px-2 py-1 text-xs bg-gray-100 text-gray-700 rounded-full">
        {{ facility.name }}
      </span>
      }
    </div>
  </div>

</div>
