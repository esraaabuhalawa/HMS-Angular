<section class="py-[60px] mb-8">
  <div
    class="container mx-auto px-4 flex flex-col gap-8 md:grid md:grid-cols-2 md:gap-10 items-center"
  >
    <!-- Image -->
    <div class="w-full flex justify-center md:justify-start">
      <div class="img-container w-full max-w-[480px]">
        <img
          src="/images/customerRev-img.png"
          alt="Happy Family"
          class="w-full h-auto object-cover rtl:transform rtl:scale-x-[-1]"

        />
      </div>
    </div>

    <!-- Content -->
    <div>
      <h2 class="text-[24px] font-medium text-primary mb-10">
        {{ 'HAPPY_CUSTOMERS.TITLE' | translate }}
      </h2>

      <!-- Stars -->
      <div class="flex gap-1 mb-5">
        <i class="pi pi-star-fill text-yellow-400 !text-[24px]"></i>
        <i class="pi pi-star-fill text-yellow-400 !text-[24px]"></i>
        <i class="pi pi-star-fill text-yellow-400 !text-[24px]"></i>
        <i class="pi pi-star-fill text-yellow-400 !text-[24px]"></i>
        <i class="pi pi-star-fill text-yellow-400 !text-[24px]"></i>
      </div>

      <p class="text-[32px] leading-[48px] text-primary font-light mb-3">
        {{ 'HAPPY_CUSTOMERS.REVIEW' | translate }}
      </p>

      <p class="text-text-secondary mb-10">{{ 'HAPPY_CUSTOMERS.AUTHOR' | translate }}</p>

      <!-- Navigation -->
      <div dir="ltr">
        <div class="flex gap-14" [class.flex-row-reverse]="isArabic">
          <button type="button" class="cursor-pointer">
            <img
              src="images/icons/icon _ Arrow Circle Left_.svg"
              alt="Previous"
              class="w-12 h-12"
              [style.transform]="isArabic ? 'scaleX(-1)' : 'none'"
            />
          </button>

          <button type="button" class="cursor-pointer">
            <img
              src="images/icons/icon _ Arrow Circle right_.svg"
              alt="Next"
              class="w-12 h-12"
              [style.transform]="isArabic ? 'scaleX(-1)' : 'none'"
            />
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
