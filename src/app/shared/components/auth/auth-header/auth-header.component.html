<h1 class="text-3xl font-medium text-black dark:text-text-primary mb-4 capitalize">
  {{ title }}
</h1>

<p class="text-base font-normal mb-6 text-gray-600 dark:text-text-secondary">
  {{ description }}
  @if( subText){
     <br />
  {{ subText }}
  }

  <a
    [routerLink]="linkUrl"
    class="font-semibold hover:underline" [class]="linkClass"
  >
    {{ linkText }}
  </a>
</p>
